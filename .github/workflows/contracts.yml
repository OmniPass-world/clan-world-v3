name: Contracts

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - dev
      - main

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - run: pnpm install --frozen-lockfile
      - name: Build contracts
        working-directory: packages/contracts
        run: pnpm run build
      - name: Check deployable bytecode sizes
        working-directory: packages/contracts
        run: pnpm run check:sizes
      - name: Run targeted contract gates
        working-directory: packages/contracts
        run: |
          bash scripts/forge.sh test --match-path test/diamond/DiamondSkeleton.t.sol
          bash scripts/forge.sh test --match-path test/diamond/DiamondEventParity.t.sol
          bash scripts/forge.sh test --match-path test/diamond/StorageLayoutGuard.t.sol
          bash scripts/forge.sh test --match-path test/SeasonFinalization.t.sol
          bash scripts/forge.sh test --match-path test/HeartbeatOrdering.t.sol
          bash scripts/forge.sh test --match-path test/BanditAttackResolution.t.sol
          bash scripts/forge.sh test --match-path test/ReservationConsistency.t.sol
      - name: Dry-run diamond deploy script
        working-directory: packages/contracts
        env:
          DEPLOYER_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
        run: bash scripts/forge.sh script script/DeployDiamond.s.sol:DeployDiamond
