# NOTE: this workflow currently builds an UNSIGNED debug APK
# (`assembleDebug`), not a signed release artifact. The job name reflects that
# so the GitHub UI doesn't imply a signed Play-Store-ready build is being cut.
# When release signing is provisioned, switch to `assembleRelease` + signing
# config and rename this back to "Android Release".
name: Android Internal Build (Debug APK)

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version label, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build-debug-apks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: android-actions/setup-android@v3

      - name: Resolve release version
        id: release
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Decode signing keystore
        id: keystore
        run: |
          path="$RUNNER_TEMP/release.keystore"
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > "$path"
          echo "path=$path" >> "$GITHUB_OUTPUT"

      - name: Build Kickstart APK
        working-directory: apps/kickstart-mobile
        env:
          # build.gradle.kts now refuses to fall back to a hardcoded URL.
          # These currently point at the dev Convex deployment + production
          # Kickstart home; promote to repo secrets when the prod Convex URL
          # is provisioned.
          CLANWORLD_CONVEX_URL: ${{ secrets.CLANWORLD_CONVEX_URL || 'https://valuable-kudu-985.convex.cloud' }}
          KICKSTART_HOME_URL: ${{ secrets.KICKSTART_HOME_URL || 'https://kickstart.easya.io' }}
          RELEASE_KEYSTORE_PATH: ${{ steps.keystore.outputs.path }}
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew --no-daemon assembleDebug

      - name: Build Clan World APK
        working-directory: apps/clan-world-mobile
        env:
          RELEASE_KEYSTORE_PATH: ${{ steps.keystore.outputs.path }}
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew --no-daemon assembleDebug

      - name: Build Clan World APK
        working-directory: apps/clan-world-mobile
        run: ./gradlew --no-daemon assembleDebug

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          cp apps/kickstart-mobile/app/build/outputs/apk/debug/app-debug.apk \
            "release-assets/kickstart-${{ steps.release.outputs.version }}-debug.apk"
          cp apps/clan-world-mobile/app/build/outputs/apk/debug/app-debug.apk \
            "release-assets/clan-world-${{ steps.release.outputs.version }}-debug.apk"
          cd release-assets
          sha256sum *.apk > SHA256SUMS.txt

      - name: Attest APK build provenance
        continue-on-error: true
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "release-assets/*.apk"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apks-${{ steps.release.outputs.version }}
          path: release-assets/*
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.version }}
          name: ${{ steps.release.outputs.version }}
          draft: false
          prerelease: false
          files: release-assets/*
