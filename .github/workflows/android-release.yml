name: Android Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version label, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build-release-apks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: android-actions/setup-android@v3

      - name: Resolve release version
        id: release
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Build Kickstart APK
        working-directory: apps/kickstart-mobile
        run: ./gradlew --no-daemon assembleDebug

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          cp apps/kickstart-mobile/app/build/outputs/apk/debug/app-debug.apk \
            "release-assets/kickstart-${{ steps.release.outputs.version }}-debug.apk"
          cd release-assets
          sha256sum *.apk > SHA256SUMS.txt

      - name: Attest APK build provenance
        continue-on-error: true
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "release-assets/*.apk"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apks-${{ steps.release.outputs.version }}
          path: release-assets/*
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.version }}
          name: ${{ steps.release.outputs.version }}
          draft: false
          prerelease: false
          files: release-assets/*
