name: ChainClient ABI Drift

on:
  pull_request:
  push:
    branches:
      - dev
      - dev-cross-phase-hygiene
      - main

jobs:
  chainclient-abi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - name: Verify Foundry
        run: |
          command -v forge >/dev/null 2>&1 || {
            echo "::error::forge is not installed after foundry-toolchain action — CI cannot validate contract ABI drift. Check the foundry-toolchain action output above."
            exit 1
          }
          forge --version
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:chainclient-abi
