name: ChainClient ABI Drift

on:
  pull_request:
  push:
    branches:
      - dev
      - dev-cross-phase-hygiene
      - main

jobs:
  chainclient-abi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Require Foundry
        run: |
          command -v forge >/dev/null 2>&1 || {
            echo "::error::forge is not installed, so contract ABI drift checks cannot run. Install Foundry: https://getfoundry.sh"
            exit 1
          }
          forge --version
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:chainclient-abi
