android.useAndroidX=true

# Compose + dex8 needs more heap than the default 512MB or the daemon thrashes
# while merging global synthetics. 3GB is generous for desktop CI; cut to 2g
# if you're on a tight host.
org.gradle.jvmargs=-Xmx3g -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8

# Smaller daemon idle timeout to release memory between local builds.
org.gradle.daemon.idletimeout=60000
