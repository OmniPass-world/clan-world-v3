# ClanWorld Elder Infrastructure — docker-compose stack
#
# Phase 1.1 scaffold (issue #344). Establishes the topology only — concrete
# image builds, Caddyfiles, runbooks, and the Makefile arrive in later phases:
#
#   - #345 agents/Dockerfile (Phase 1.2)
#   - #347 self-hosted Convex deploy (Phase 1.4)
#   - #348 host caddy snippet + Caddyfile (Phase 1.5)
#   - #349 elder-N service template (Phase 1.6) — these stubs will be
#     overwritten by the generated docker-compose.elders.yml
#   - #355 agents/Makefile (Phase 1.12)
#   - #356 migration runbook (Phase 1.13)
#
# Profiles (per locked decision in docs/plans/dockerize-elder-infra-v1.md):
#
#   --profile dev   anvil-fork + bind-mount agents/  (local iteration)
#   --profile prod  real Base Sepolia RPC, image-baked agents/  (VPS deploy)
#
# Caddy is NOT a compose service — host caddy stays authoritative (decision D
# in the plan). The clan-world stack reverse-proxies through the host caddy via
# CADDY_HOST_PORT.
#
# Validation:
#   docker compose --profile dev config
#   docker compose --profile prod config

name: clan-world

networks:
  clan-world-internal:
    driver: bridge

volumes:
  # Self-hosted Convex SQLite — wired up in #347
  convex_data: {}
  # anvil-fork persisted fork state (dev profile only) — wired up in #346
  anvil_data: {}
  # Per-Elder R/W volumes — wired up in #349. Declared here so `docker compose
  # config` can resolve mount references early.
  elder-1-home: {}
  elder-1-workspace: {}
  elder-2-home: {}
  elder-2-workspace: {}
  elder-3-home: {}
  elder-3-workspace: {}
  elder-4-home: {}
  elder-4-workspace: {}

secrets:
  # Plan revision (Finding 10): admin key lives in a file mounted as a Docker
  # secret, NOT an env var (env vars leak through `docker inspect`).
  # `make bootstrap-convex-admin-key` (Phase 1.12) materializes these files.
  #
  # WHAT THIS FILE CONTAINS (Phase 1.4, #347):
  #   The admin key is a string of the form `<instance-name>|<hex>` produced
  #   by `/convex/generate_admin_key.sh` inside the convex-backend container.
  #   It is derived from INSTANCE_NAME + INSTANCE_SECRET (both persisted in
  #   the convex_data volume at /convex/data/credentials/). The backend does
  #   NOT itself read this file — it regenerates the key on demand from the
  #   persisted INSTANCE_SECRET. The file is consumed by:
  #     - convex-dashboard (CONVEX_SELF_HOSTED_ADMIN_KEY env var)
  #     - `npx convex deploy` from heartbeat container / host (via the
  #       CONVEX_SELF_HOSTED_ADMIN_KEY env var or the --admin-key flag)
  #     - bin/import-convex-schema.sh, bin/migrate-from-hosted-convex.sh
  #
  # Bootstrap on first stack-up:
  #   `make bootstrap-convex-admin-key` (Phase 1.12, #355) brings up the
  #   convex-backend, execs `/convex/generate_admin_key.sh`, writes the
  #   output to /etc/clan-world/secrets/convex-admin.key (chmod 600), and
  #   symlinks agents/secrets/convex-admin.key to that path. The
  #   INSTANCE_SECRET is auto-persisted to the volume so the captured key
  #   stays valid across restarts (no rotation unless the volume is wiped).
  #   Note: `generate_admin_key.sh` embeds a random nonce, so successive
  #   calls produce different key strings — all valid for the same instance.
  convex-admin-key:
    file: ./agents/secrets/convex-admin.key
  # Webhook HMAC shared secret for heartbeat → Convex webhook (Finding 30 fix).
  webhook-shared:
    file: ./agents/secrets/webhook-shared.key
  # Per-Elder bus secrets (Finding 22 fix — per-elder, not shared).
  bus-elder-1:
    file: ./agents/secrets/bus-elder-1.key
  bus-elder-2:
    file: ./agents/secrets/bus-elder-2.key
  bus-elder-3:
    file: ./agents/secrets/bus-elder-3.key
  bus-elder-4:
    file: ./agents/secrets/bus-elder-4.key
  # Operator secret for enqueueing commands into the Convex bus.
  bus-operator:
    file: ./agents/secrets/bus-operator.key

# Shared building blocks (YAML anchors, NOT compose services).
# Profiles let us reuse the same elder service block in both dev and prod with
# only the agents-mount strategy and image tag differing.
x-elder-common: &elder-common
  image: clanworld/agents:dev
  restart: unless-stopped
  networks: [clan-world-internal]
  cap_add:
    - NET_ADMIN  # Required by agents/shared/init-firewall.sh (#345).
  depends_on:
    convex-backend:
      condition: service_healthy

services:
  # ---------------------------------------------------------------------------
  # Self-hosted Convex backend + dashboard. Phase 1.4 (#347).
  #
  # Image pinning: CONVEX_BACKEND_TAG and CONVEX_DASHBOARD_TAG MUST be set to
  # a specific commit SHA in .env (NOT `:latest`, per Phase 1.4 plan + Convex
  # self-host research synthesis 2026-05-16). The default below pins to git
  # SHA dd00d1f30042cedab25b8cc76a23c40cc2abbd90 — the latest stable
  # release `precompiled-2026-05-13-dd00d1f` at the time of Phase 1.4. Pin
  # bumps require an explicit PR + restart test.
  #
  # Data path: the official convex image stores data under /convex/data (NOT
  # /data — earlier scaffold was wrong). Persisted artifacts:
  #   /convex/data/db.sqlite3          - SQLite DB (paused for backup)
  #   /convex/data/storage/            - file-storage backend (local mode)
  #   /convex/data/credentials/        - INSTANCE_NAME + INSTANCE_SECRET
  #                                      (re-deriving the same admin key
  #                                      across restarts)
  #
  # Admin-key lifecycle (empirically verified 2026-05-16 on pinned SHA):
  #   1. First stack-up: container writes a fresh INSTANCE_SECRET into
  #      /convex/data/credentials/instance_secret on the convex_data volume.
  #      `make bootstrap-convex-admin-key` execs the in-container generator
  #      and saves the output to agents/secrets/convex-admin.key.
  #   2. Subsequent restarts: container reads the persisted INSTANCE_SECRET
  #      so the SAME secret unlocks the instance. The `generate_admin_key.sh`
  #      script embeds a random nonce, so successive invocations produce
  #      DIFFERENT key strings — but EVERY such key authenticates against
  #      the same persisted INSTANCE_SECRET. The bootstrap-captured key
  #      remains valid as long as the volume isn't wiped.
  #   3. Volume wipe = INSTANCE_SECRET rotation = every captured key
  #      invalidates. Re-bootstrap required.
  # ---------------------------------------------------------------------------
  convex-backend:
    image: ghcr.io/get-convex/convex-backend:${CONVEX_BACKEND_TAG:-dd00d1f30042cedab25b8cc76a23c40cc2abbd90}
    stop_grace_period: 10s
    stop_signal: SIGINT
    environment:
      # INSTANCE_NAME pins the deployment identity. Persisted on first run
      # to /convex/data/credentials/instance_name; setting it here makes the
      # initial value deterministic per CHAIN_NETWORK profile.
      INSTANCE_NAME: clan-world-${CHAIN_NETWORK:?CHAIN_NETWORK required (dev|prod)}
      # Disable the upstream telemetry beacon (Convex phones home on startup
      # otherwise). Self-host research synthesis 2026-05-16: opt out by default.
      DISABLE_BEACON: "true"
      # /metrics endpoint disabled (Prometheus-compat). Enable in a follow-up
      # if observability is added.
      DISABLE_METRICS_ENDPOINT: "true"
      # Lower default document retention to 2 days (matches official self-host
      # default; reduces SQLite growth).
      DOCUMENT_RETENTION_DELAY: "172800"
      # Origin URLs used in storage URLs + action callbacks. Internal-only by
      # default; override in .env if the backend is fronted by Caddy/TLS.
      CONVEX_CLOUD_ORIGIN: ${CONVEX_CLOUD_ORIGIN:-http://convex-backend:3210}
      CONVEX_SITE_ORIGIN: ${CONVEX_SITE_ORIGIN:-http://convex-backend:3211}
      # Allow plain HTTP between containers (no TLS terminator inside the
      # docker network — Caddy handles TLS at the edge).
      DO_NOT_REQUIRE_SSL: "true"
      RUST_LOG: ${CONVEX_RUST_LOG:-info}
    # NOTE: the admin key secret is NOT mounted into convex-backend itself —
    # the backend regenerates it on demand from the persisted INSTANCE_SECRET
    # in the data volume. It IS mounted into convex-dashboard (below) and is
    # read by `bin/import-convex-schema.sh` / `bin/migrate-from-hosted-convex.sh`
    # via the CONVEX_SELF_HOSTED_ADMIN_KEY env var.
    volumes:
      - convex_data:/convex/data
    networks: [clan-world-internal]
    # Host-side port publishing. Bound to 127.0.0.1 (loopback only) so the
    # backend is reachable from `npx convex deploy` on the host but NOT from
    # the public internet. In prod (CONVEX_BACKEND_HOST_PORT empty/0), set
    # to an unbound value to disable; the elder containers reach the backend
    # via the docker network at convex-backend:3210 regardless.
    #
    # Default 38046 / 38047 are the canonical dev ports declared in
    # .world/ports.yml (clan-world-convex-backend and
    # clan-world-convex-backend-site). Override per-worktree via the .env
    # values set by `port-for clan-world-convex-backend`.
    ports:
      - "127.0.0.1:${CONVEX_BACKEND_HOST_PORT:-38046}:3210"
      - "127.0.0.1:${CONVEX_BACKEND_SITE_HOST_PORT:-38047}:3211"
    # Healthcheck: `/version` returns HTTP 200 once the backend is accepting
    # requests. The earlier `/health` path returns 404 in this image — verified
    # against the pinned SHA on 2026-05-16. The official self-host compose
    # uses `/version` for the same reason.
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3210/version"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    profiles: [dev, prod]

  convex-dashboard:
    image: ghcr.io/get-convex/convex-dashboard:${CONVEX_DASHBOARD_TAG:-dd00d1f30042cedab25b8cc76a23c40cc2abbd90}
    stop_grace_period: 10s
    stop_signal: SIGINT
    environment:
      # The dashboard is a Next.js app that talks to the backend at this URL.
      # When fronted by Caddy with TLS termination, override to the public URL.
      NEXT_PUBLIC_DEPLOYMENT_URL: ${CONVEX_DASHBOARD_DEPLOYMENT_URL:-http://convex-backend:3210}
    # NOTE: the admin key secret is intentionally NOT mounted into the
    # dashboard. The dashboard prompts the operator for the admin key in its
    # UI on first visit (and stores it in localStorage). This avoids exposing
    # the key via a server-side env var that would be readable by anyone with
    # `docker inspect` access. The CLI / bin/ scripts read the key from
    # agents/secrets/convex-admin.key directly.
    networks: [clan-world-internal]
    depends_on:
      convex-backend:
        condition: service_healthy
    # Bind to 127.0.0.1 — production access flows through host caddy +
    # basic-auth at /convex-admin (Phase 1.5).
    ports:
      - "127.0.0.1:${CONVEX_DASHBOARD_HOST_PORT:-38048}:6791"
    # Healthcheck: this image does NOT ship wget — earlier scaffold used
    # `wget --spider` which would have failed. curl IS present. The dashboard
    # root path serves the Next.js entry HTML when healthy.
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:6791/"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    profiles: [dev, prod]

  # ---------------------------------------------------------------------------
  # anvil-fork — dev profile ONLY. Forks Base Sepolia at FORK_BLOCK_NUMBER and
  # impersonates the diamond owner so dev iteration burns zero real RPC credits.
  # Implementation details (state intervals, auto-impersonate flags) land in
  # #346 (Phase 1.3).
  # ---------------------------------------------------------------------------
  anvil-fork:
    image: ghcr.io/foundry-rs/foundry:v1.2.0
    entrypoint: anvil
    command:
      - --host=0.0.0.0
      - --fork-url=${BASE_SEPOLIA_RPC_FOR_FORK_SEED:-}
      - --fork-block-number=${FORK_BLOCK_NUMBER:-0}
      - --state=/data/anvil-state.json
      - --state-interval=60
      - --chain-id=84532
      - --gas-price=0
      - --block-time=2
      - --auto-impersonate
    volumes:
      - anvil_data:/data
    networks: [clan-world-internal]
    healthcheck:
      test: ["CMD-SHELL", "cast chain-id --rpc-url http://localhost:8545 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    profiles: [dev]

  # ---------------------------------------------------------------------------
  # Heartbeat — calls heartbeat() on the diamond every 60s + posts an HMAC-
  # signed webhook to Convex. Pre-flight assertions, HMAC signing, and the
  # single-caller guard land in #353 (Phase 1.10).
  # ---------------------------------------------------------------------------
  heartbeat:
    image: clanworld/heartbeat:dev
    environment:
      CHAIN_NETWORK: ${CHAIN_NETWORK:?CHAIN_NETWORK required (dev|prod)}
      # Profile-specific overlay sets exactly ONE of these (Finding 9 + 48 fix
      # — no cross-env fallback). Entrypoint picks based on CHAIN_NETWORK and
      # aborts if the selected URL is empty.
      DEV_RPC_URL: ${DEV_RPC_URL:-}
      PROD_RPC_URL: ${PROD_RPC_URL:-}
      CONVEX_DEPLOY_URL: http://convex-backend:3210
      CLAN_WORLD_CONTRACT_ADDRESS: ${CLAN_WORLD_CONTRACT_ADDRESS:?CLAN_WORLD_CONTRACT_ADDRESS required}
      WEBHOOK_SHARED_SECRET_FILE: /run/secrets/webhook-shared
    secrets:
      - webhook-shared
    # NOTE: host crontab mount removed per cloud-reviewer security finding.
    # Single-caller preflight (Finding 29) now relies on docker compose
    # `restart: on-failure:0` instead — a second instance can't be started
    # by compose, and an external single-caller check uses Convex-side
    # heartbeat state (last successful tick timestamp) for liveness.
    networks: [clan-world-internal]
    depends_on:
      convex-backend:
        condition: service_healthy
    healthcheck:
      # Webhook timestamp file is touched on every successful heartbeat tick.
      test: ["CMD-SHELL", "test -f /tmp/last-heartbeat-success && [ $$(($$(date +%s) - $$(cat /tmp/last-heartbeat-success))) -lt 120 ]"]
      interval: 30s
      timeout: 5s
      retries: 2
      start_period: 60s
    # Failed preflight stays failed visibly — operator must intervene.
    restart: on-failure:0
    profiles: [dev, prod]

  # ---------------------------------------------------------------------------
  # Elder containers (4 in v1 — scaling to 12 is a config change). Each Elder
  # runs three processes under tini: ttyd (port 7681) + tmux server + the
  # elder-runtime supervisor (Node, in #354). Locked to ONE container per
  # Elder (Finding 24 fix — sibling containers can't share tmux sockets).
  #
  # Volume mounts differ by profile (Finding 1.6 — agents/ bind-mount in dev
  # for fast iteration, image-baked in prod for immutability). The dev/prod
  # split is expressed via separate service blocks rather than YAML overlays
  # so `docker compose --profile {dev,prod} config` resolves cleanly without
  # external overlay files.
  # ---------------------------------------------------------------------------
  elder-1:
    <<: *elder-common
    container_name: clan-world-elder-1
    environment:
      ELDER_N: "1"
      ELDER_ID: ${ELDER_1_CLAN_ID:-1}
      CONVEX_DEPLOY_URL: http://convex-backend:3210
      BUS_ELDER_SECRET_FILE: /run/secrets/bus-elder-1
      ANTHROPIC_API_KEY: ${ELDER_1_ANTHROPIC_API_KEY:-}
      CLAUDE_CODE_OAUTH_TOKEN: ${ELDER_1_CLAUDE_CODE_OAUTH_TOKEN:-}
    secrets:
      - bus-elder-1
    volumes:
      # Per-Elder R/W runtime state — survives container restart.
      - elder-1-home:/home/elder/.claude
      - elder-1-workspace:/workspace
    healthcheck:
      test: ["CMD-SHELL", "tmux has-session -t elder-1 && pgrep -f /opt/elder-runtime/main.js"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s
    profiles: [dev, prod]

  elder-2:
    <<: *elder-common
    container_name: clan-world-elder-2
    environment:
      ELDER_N: "2"
      ELDER_ID: ${ELDER_2_CLAN_ID:-2}
      CONVEX_DEPLOY_URL: http://convex-backend:3210
      BUS_ELDER_SECRET_FILE: /run/secrets/bus-elder-2
      ANTHROPIC_API_KEY: ${ELDER_2_ANTHROPIC_API_KEY:-}
      CLAUDE_CODE_OAUTH_TOKEN: ${ELDER_2_CLAUDE_CODE_OAUTH_TOKEN:-}
    secrets:
      - bus-elder-2
    volumes:
      - elder-2-home:/home/elder/.claude
      - elder-2-workspace:/workspace
    healthcheck:
      test: ["CMD-SHELL", "tmux has-session -t elder-2 && pgrep -f /opt/elder-runtime/main.js"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s
    profiles: [dev, prod]

  elder-3:
    <<: *elder-common
    container_name: clan-world-elder-3
    environment:
      ELDER_N: "3"
      ELDER_ID: ${ELDER_3_CLAN_ID:-3}
      CONVEX_DEPLOY_URL: http://convex-backend:3210
      BUS_ELDER_SECRET_FILE: /run/secrets/bus-elder-3
      ANTHROPIC_API_KEY: ${ELDER_3_ANTHROPIC_API_KEY:-}
      CLAUDE_CODE_OAUTH_TOKEN: ${ELDER_3_CLAUDE_CODE_OAUTH_TOKEN:-}
    secrets:
      - bus-elder-3
    volumes:
      - elder-3-home:/home/elder/.claude
      - elder-3-workspace:/workspace
    healthcheck:
      test: ["CMD-SHELL", "tmux has-session -t elder-3 && pgrep -f /opt/elder-runtime/main.js"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s
    profiles: [dev, prod]

  elder-4:
    <<: *elder-common
    container_name: clan-world-elder-4
    environment:
      ELDER_N: "4"
      ELDER_ID: ${ELDER_4_CLAN_ID:-4}
      CONVEX_DEPLOY_URL: http://convex-backend:3210
      BUS_ELDER_SECRET_FILE: /run/secrets/bus-elder-4
      ANTHROPIC_API_KEY: ${ELDER_4_ANTHROPIC_API_KEY:-}
      CLAUDE_CODE_OAUTH_TOKEN: ${ELDER_4_CLAUDE_CODE_OAUTH_TOKEN:-}
    secrets:
      - bus-elder-4
    volumes:
      - elder-4-home:/home/elder/.claude
      - elder-4-workspace:/workspace
    healthcheck:
      test: ["CMD-SHELL", "tmux has-session -t elder-4 && pgrep -f /opt/elder-runtime/main.js"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s
    profiles: [dev, prod]
