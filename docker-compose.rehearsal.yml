# docker-compose.rehearsal.yml
#
# Throwaway overlay for the Phase 2 migration rehearsal.
# Docs: docs/runbooks/dockerize-migration-v1.md (Step 1)
#
# Usage:
#   docker compose -f docker-compose.rehearsal.yml up -d
#   docker compose -f docker-compose.rehearsal.yml down -v
#
# Key differences from the prod stack:
#   - Compose project: clan-world-rehearsal  (isolated from prod clan-world project)
#   - Named volumes:   *_rehearsal suffix     (no overlap with prod volumes)
#   - Host ports:      38050 / 38051 / 38052  (no collision with prod 38046-38048)
#   - Services:        convex-backend + convex-dashboard only
#                      (no elder containers — rehearsal tests schema/import only)
#   - Caddy:           NOT configured         (rehearsal is loopback-only)
#
# Bring up:   docker compose -f docker-compose.rehearsal.yml up -d
# Tear down:  docker compose -f docker-compose.rehearsal.yml down -v
#             (-v removes the rehearsal volumes — intended, these are throwaway)

name: clan-world-rehearsal

services:
  convex-backend:
    image: ghcr.io/get-convex/convex-backend:${CONVEX_BACKEND_TAG:-dd00d1f30042cedab25b8cc76a23c40cc2abbd90}
    restart: unless-stopped
    environment:
      CONVEX_INSTANCE_NAME: clanworld-rehearsal
      # Admin key is read from the same secret file as prod; the instance name
      # differs so the rehearsal key is logically separate even if bytes match.
      CONVEX_SELF_HOSTED_ADMIN_KEY_FILE: /run/secrets/convex-admin
    ports:
      # Rehearsal ports — chosen to avoid collision with prod (38046-38048)
      - "127.0.0.1:38050:3210"    # HTTP API
      - "127.0.0.1:38051:3211"    # WebSocket / site
    volumes:
      - convex_data_rehearsal:/convex/data
    secrets:
      - convex-admin
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3210/api/query"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  convex-dashboard:
    image: ghcr.io/get-convex/convex-dashboard:${CONVEX_DASHBOARD_TAG:-dd00d1f30042cedab25b8cc76a23c40cc2abbd90}
    restart: unless-stopped
    environment:
      CONVEX_SELF_HOSTED_URL: http://convex-backend:3210
      CONVEX_SELF_HOSTED_ADMIN_KEY_FILE: /run/secrets/convex-admin
    ports:
      - "127.0.0.1:38052:6791"
    depends_on:
      convex-backend:
        condition: service_healthy
    secrets:
      - convex-admin

volumes:
  convex_data_rehearsal:
    # Throwaway — wiped by `docker compose -f docker-compose.rehearsal.yml down -v`
    name: clan-world-rehearsal_convex_data

secrets:
  convex-admin:
    file: agents/secrets/convex-admin.key
