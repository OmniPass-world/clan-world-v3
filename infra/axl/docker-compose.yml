# Gensyn AXL sidecar — one node per elder for local elder-to-elder smoke testing.
# Each node peers with the other three over the compose network (port 9001 TLS).
# HTTP API is exposed on the host: axl-1 → 9002, axl-2 → 9003,
# axl-3 → 9004, axl-4 → 9005.
services:
  axl-1:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "9002:9002"
    environment:
      - AXL_PEER_ADDRS=axl-2:9001,axl-3:9001,axl-4:9001
    volumes:
      - axl-1-keystore:/keystore
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9002/topology"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - axl-net

  axl-2:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "9003:9002"
    environment:
      - AXL_PEER_ADDRS=axl-1:9001,axl-3:9001,axl-4:9001
    volumes:
      - axl-2-keystore:/keystore
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9002/topology"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - axl-net

  axl-3:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "9004:9002"
    environment:
      - AXL_PEER_ADDRS=axl-1:9001,axl-2:9001,axl-4:9001
    volumes:
      - axl-3-keystore:/keystore
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9002/topology"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - axl-net

  axl-4:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "9005:9002"
    environment:
      - AXL_PEER_ADDRS=axl-1:9001,axl-2:9001,axl-3:9001
    volumes:
      - axl-4-keystore:/keystore
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9002/topology"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - axl-net

networks:
  axl-net:
    driver: bridge

volumes:
  axl-1-keystore:
  axl-2-keystore:
  axl-3-keystore:
  axl-4-keystore:
